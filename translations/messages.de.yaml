about:
    title: "Über uns | Endlech.lu"
    heading: "Über uns"
    subtitle: "Die Geschichte hinter Endlech.lu — einer Plattform, die lange überfällig war."
    founder: "Gründer"
    founder_bio: "Ich bin Michael, 30 Jahre alt und seit Geburt mit SMA2 (Spinale Muskelatrophie Typ 2) beeinträchtigt. Als leidenschaftlicher Programmierer und Fotograf weiß ich aus eigener Erfahrung, wie wichtig echte Barrierefreiheit im Alltag ist — und genau das treibt mich bei Endlech.lu an."
    tag_age: "30 Jahre"
    tag_sma: "SMA2"
    tag_programmer: "Programmierer"
    tag_photographer: "Fotograf"
    story_title: "Die Geschichte von Endlech.lu"
    story_intro: "Endlech.lu war eigentlich schon seit Jahren überfällig. Die Idee hatte ich schon als Jugendlicher — ein Ort, an dem Menschen mit eingeschränkter Mobilität unkompliziert barrierefreie Restaurants in Luxemburg finden können. Etwas, das es so einfach und übersichtlich schlicht noch nicht gab."
    timeline_2018_title: "Planung beginnt"
    timeline_2018_text: "Die Idee reifte zur konkreten Entscheidung: Ich wollte die Plattform wirklich bauen. 2018 begann ich, das Projekt ernsthaft zu planen."
    timeline_2020_title: "Aktive Entwicklung"
    timeline_2020_text: "Gemeinsam mit einem Freund und Partner begann ich, die Plattform aktiv umzusetzen. Wir teilten die Vision und arbeiteten mit echtem Elan daran."
    timeline_2022_title: "Unfreiwillige Pause"
    timeline_2022_text: "Leider klappte es mit dem Partner nicht, und alleine fehlte mir schlicht die Zeit. Das Projekt musste ich schweren Herzens auf Eis legen."
    timeline_2025_title: "Neustart"
    timeline_2025_text: "Ende 2025 habe ich beschlossen, wieder anzufangen — und es diesmal durchzuziehen. Endlech.lu ist jetzt live."
    mission_title: "Unsere Mission"
    mission_text: "Barrierefreiheit soll kein Zufall sein. Mit Endlech.lu wollen wir Menschen mit eingeschränkter Mobilität helfen, Restaurants in Luxemburg zu finden, die wirklich zugänglich sind — geprüft von der Community, für die Community."
    mission_cta: "Restaurants entdecken"

legal:
    title: "Impressum – Endlech.lu"
    heading: "Impressum"
    info_title: "Angaben gemäß § 5 TMG / Art. 11 Loi sur le commerce électronique"
    info_text: "Endlech.lu\nLuxemburg"
    contact_title: "Kontakt"
    contact_email_label: "E-Mail:"
    disclaimer_title: "Haftungsausschluss"
    content_title: "Haftung für Inhalte"
    content_text: "Die Inhalte unserer Seiten wurden mit größter Sorgfalt erstellt. Für die Richtigkeit, Vollständigkeit und Aktualität der Inhalte können wir jedoch keine Gewähr übernehmen."
    links_title: "Haftung für Links"
    links_text: "Unser Angebot enthält Links zu externen Webseiten Dritter, auf deren Inhalte wir keinen Einfluss haben. Deshalb können wir für diese fremden Inhalte auch keine Gewähr übernehmen. Für die Inhalte der verlinkten Seiten ist stets der jeweilige Anbieter oder Betreiber der Seiten verantwortlich."
    privacy_title: "Datenschutz"
    privacy_text: "Die Nutzung unserer Webseite ist in der Regel ohne Angabe personenbezogener Daten möglich. Soweit auf unseren Seiten personenbezogene Daten (beispielsweise Name, Anschrift oder E-Mail-Adressen) erhoben werden, erfolgt dies, soweit möglich, stets auf freiwilliger Basis."

criteria:
    title: "Kriterien für Barrierefreiheit – Endlech.lu"
    heading: "Kriterien für Barrierefreiheit"
    intro: "Diese Kriterien helfen uns, Restaurants objektiv auf ihre Barrierefreiheit zu bewerten. Jedes Restaurant wird anhand der folgenden Punkte eingeschätzt."
    entrance_title: "Barrierefreier Eingang"
    entrance_text: "Der Eingang ist ohne Stufen oder Schwellen zugänglich, oder eine Rampe ist vorhanden. Automatische oder leicht zu öffnende Türen sind ein Plus."
    parking_title: "Behindertenparkplatz"
    parking_text: "Ein ausgewiesener Parkplatz für Personen mit Behinderung in unmittelbarer Nähe des Eingangs ist vorhanden."
    toilet_title: "Barrierefreie Toilette"
    toilet_text: "Eine rollstuhlgerechte Toilette mit ausreichend Bewegungsfreiheit, Haltegriffen und erreichbarem Waschbecken ist vorhanden."
    interior_title: "Rollstuhlgerechtes Inneres"
    interior_text: "Ausreichend breite Gänge (mindestens 90 cm), unterfahrbare Tische und genügend Bewegungsraum zwischen den Sitzplätzen ermöglichen eine selbstständige Navigation."
    staff_title: "Hilfsbereites Personal"
    staff_text: "Das Personal ist sensibilisiert und bereit, Menschen mit Einschränkungen aktiv zu unterstützen – ohne aufdringlich zu sein."
    menu_title: "Gut lesbare Speisekarte"
    menu_text: "Die Speisekarte ist in gut lesbarer Schriftgröße gedruckt oder digital verfügbar. Braille- oder Großdruck-Versionen sind ein weiteres Plus."
    note_label: "Hinweis:"
    note_text: "Die Bewertungen auf Endlech.lu basieren auf Erfahrungen unserer Community. Barrierefreiheit kann sich je nach individuellem Bedarf unterscheiden. Wir empfehlen, vor dem Besuch direkt beim Restaurant nachzufragen."


about:
    title: "À propos | Endlech.lu"
    heading: "À propos"
    subtitle: "L'histoire derrière Endlech.lu — une plateforme attendue depuis longtemps."
    founder: "Fondateur"
    founder_bio: "Je suis Michael, 30 ans, atteint de SMA2 (Amyotrophie spinale de type 2) depuis la naissance. En tant que programmeur et photographe passionné, je sais par expérience personnelle à quel point une vraie accessibilité est importante au quotidien — et c'est exactement ce qui me motive chez Endlech.lu."
    tag_age: "30 ans"
    tag_sma: "SMA2"
    tag_programmer: "Programmeur"
    tag_photographer: "Photographe"
    story_title: "L'histoire d'Endlech.lu"
    story_intro: "Endlech.lu était en fait attendu depuis des années. J'ai eu l'idée étant adolescent — un endroit où les personnes à mobilité réduite pourraient facilement trouver des restaurants accessibles au Luxembourg. Quelque chose qui n'existait tout simplement pas de manière aussi simple et claire."
    timeline_2018_title: "Début de la planification"
    timeline_2018_text: "L'idée est devenue une décision concrète : je voulais vraiment construire la plateforme. En 2018, j'ai commencé à planifier sérieusement le projet."
    timeline_2020_title: "Développement actif"
    timeline_2020_text: "Avec un ami et partenaire, j'ai commencé à développer activement la plateforme. Nous partagions la vision et y travaillions avec un vrai enthousiasme."
    timeline_2022_title: "Pause involontaire"
    timeline_2022_text: "Malheureusement, les choses n'ont pas fonctionné avec mon partenaire, et seul, je n'avais tout simplement pas le temps. J'ai dû mettre le projet en pause à contrecœur."
    timeline_2025_title: "Nouveau départ"
    timeline_2025_text: "Fin 2025, j'ai décidé de recommencer — et cette fois d'aller jusqu'au bout. Avec une énergie nouvelle et le bon stack technique, j'ai relancé le développement de zéro."
    timeline_2026_date: "Mars 2026"
    timeline_2026_title: "Première version en ligne"
    timeline_2026_text: "En mars 2026, Endlech.lu est enfin en ligne — avec de vraies données de restaurants, des filtres d'accessibilité, des suggestions de la communauté et un panneau d'administration complet. Les bases sont posées, et la plateforme grandit avec chaque avis."
    mission_title: "Notre mission"
    mission_text: "L'accessibilité ne devrait pas être une question de hasard. Avec Endlech.lu, nous voulons aider les personnes à mobilité réduite à trouver des restaurants au Luxembourg qui sont vraiment accessibles — vérifiés par la communauté, pour la communauté."
    mission_cta: "Découvrir les restaurants"

legal:
    title: "Mentions légales – Endlech.lu"
    heading: "Mentions légales"
    info_title: "Informations conformément au § 5 TMG / Art. 11 Loi sur le commerce électronique"
    info_text: "Endlech.lu\nLuxembourg"
    contact_title: "Contact"
    contact_email_label: "E-mail :"
    disclaimer_title: "Avertissement"
    content_title: "Responsabilité du contenu"
    content_text: "Le contenu de nos pages a été créé avec le plus grand soin. Cependant, nous ne pouvons garantir l'exactitude, l'exhaustivité et l'actualité du contenu."
    links_title: "Responsabilité des liens"
    links_text: "Notre site contient des liens vers des sites web externes de tiers sur le contenu desquels nous n'avons aucune influence. Par conséquent, nous ne pouvons assumer aucune responsabilité pour ce contenu externe. Le fournisseur ou l'exploitant respectif des pages est toujours responsable du contenu des pages liées."
    privacy_title: "Protection des données"
    privacy_text: "L'utilisation de notre site web est généralement possible sans fournir de données personnelles. Dans la mesure où des données personnelles (par exemple nom, adresse ou adresses e-mail) sont collectées sur nos pages, cela se fait toujours sur une base volontaire dans la mesure du possible."

criteria:
    title: "Critères d'accessibilité – Endlech.lu"
    heading: "Critères d'accessibilité"
    intro: "Ces critères nous aident à évaluer objectivement l'accessibilité des restaurants. Chaque restaurant est évalué sur la base des points suivants."
    entrance_title: "Entrée accessible"
    entrance_text: "L'entrée est accessible sans marches ni seuils, ou une rampe est disponible. Les portes automatiques ou faciles à ouvrir sont un plus."
    parking_title: "Place de parking handicapé"
    parking_text: "Une place de parking réservée aux personnes handicapées est disponible à proximité immédiate de l'entrée."
    toilet_title: "Toilettes accessibles"
    toilet_text: "Des toilettes accessibles en fauteuil roulant avec suffisamment d'espace, des barres d'appui et un lavabo accessible sont disponibles."
    interior_title: "Intérieur accessible en fauteuil roulant"
    interior_text: "Des allées suffisamment larges (au moins 90 cm), des tables accessibles en fauteuil roulant et suffisamment d'espace entre les places assises permettent une navigation autonome."
    staff_title: "Personnel serviable"
    staff_text: "Le personnel est sensibilisé et prêt à aider activement les personnes en situation de handicap — sans être intrusif."
    menu_title: "Menu lisible"
    menu_text: "Le menu est imprimé dans une taille de police lisible ou disponible en format numérique. Les versions en braille ou en gros caractères sont un plus supplémentaire."
    note_label: "Remarque :"
    note_text: "Les avis sur Endlech.lu sont basés sur les expériences de notre communauté. L'accessibilité peut varier selon les besoins individuels. Nous recommandons de contacter directement le restaurant avant votre visite."


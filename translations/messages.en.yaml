criteria:
    title: "Accessibility Criteria – Endlech.lu"
    heading: "Accessibility Criteria"
    intro: "These criteria help us objectively assess restaurants for their accessibility. Each restaurant is evaluated based on the following points."
    entrance_title: "Accessible Entrance"
    entrance_text: "The entrance is accessible without steps or thresholds, or a ramp is available. Automatic or easy-to-open doors are a plus."
    parking_title: "Disabled Parking"
    parking_text: "A designated parking space for people with disabilities is available in close proximity to the entrance."
    toilet_title: "Accessible Toilet"
    toilet_text: "A wheelchair-accessible toilet with sufficient space, grab bars, and an accessible sink is available."
    interior_title: "Wheelchair-Friendly Interior"
    interior_text: "Sufficiently wide aisles (at least 90 cm), tables with wheelchair clearance, and enough space between seats allow independent navigation."
    staff_title: "Helpful Staff"
    staff_text: "Staff are aware and willing to actively support people with limitations — without being intrusive."
    menu_title: "Readable Menu"
    menu_text: "The menu is printed in a readable font size or available digitally. Braille or large print versions are an additional plus."
    note_label: "Note:"
    note_text: "The reviews on Endlech.lu are based on experiences from our community. Accessibility may vary depending on individual needs. We recommend contacting the restaurant directly before your visit."


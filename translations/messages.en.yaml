about:
    title: "About Us | Endlech.lu"
    heading: "About Us"
    subtitle: "The story behind Endlech.lu — a platform that was long overdue."
    founder: "Founder"
    founder_bio: "I'm Michael, 30 years old, and affected by SMA2 (Spinal Muscular Atrophy Type 2) since birth. As a passionate programmer and photographer, I know from personal experience how important true accessibility is in daily life — and that's exactly what drives me at Endlech.lu."
    tag_age: "30 years"
    tag_sma: "SMA2"
    tag_programmer: "Programmer"
    tag_photographer: "Photographer"
    story_title: "The Story of Endlech.lu"
    story_intro: "Endlech.lu was actually long overdue. I had the idea as a teenager — a place where people with limited mobility could easily find accessible restaurants in Luxembourg. Something that simply didn't exist in such a simple and clear way."
    timeline_2018_title: "Planning Begins"
    timeline_2018_text: "The idea matured into a concrete decision: I wanted to actually build the platform. In 2018, I began seriously planning the project."
    timeline_2020_title: "Active Development"
    timeline_2020_text: "Together with a friend and partner, I began actively building the platform. We shared the vision and worked on it with real enthusiasm."
    timeline_2022_title: "Involuntary Pause"
    timeline_2022_text: "Unfortunately, things didn't work out with my partner, and alone I simply didn't have the time. I had to reluctantly put the project on hold."
    timeline_2025_title: "Restart"
    timeline_2025_text: "At the end of 2025, I decided to start again — and see it through this time. With fresh energy and the right tech stack, I restarted the development from scratch."
    timeline_2026_date: "March 2026"
    timeline_2026_title: "First Live Version"
    timeline_2026_text: "In March 2026, Endlech.lu finally goes live — with real restaurant data, accessibility filters, community suggestions, and a full admin panel. The foundation is set, and the platform grows with every review."
    mission_title: "Our Mission"
    mission_text: "Accessibility shouldn't be a matter of chance. With Endlech.lu, we want to help people with limited mobility find restaurants in Luxembourg that are truly accessible — verified by the community, for the community."
    mission_cta: "Discover Restaurants"


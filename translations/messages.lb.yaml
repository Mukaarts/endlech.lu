about:
    title: "Iwwer eis | Endlech.lu"
    heading: "Iwwer eis"
    subtitle: "D'Geschicht hannert Endlech.lu — enger Plattform, déi scho laang iwwerfälleg war."
    founder: "Grënner"
    founder_bio: "Ech sinn de Michael, 30 Joer al a säit der Gebuert mat SMA2 (Spinale Muskelatrophie Typ 2) betraff. Als passionéierte Programméierer a Fotograf weess ech aus eegener Erfarung, wéi wichteg richteg Barrierefreiheet am Alldag ass — an dat ass genau dat, wat mech bei Endlech.lu undréift."
    tag_age: "30 Joer"
    tag_sma: "SMA2"
    tag_programmer: "Programméierer"
    tag_photographer: "Fotograf"
    story_title: "D'Geschicht vun Endlech.lu"
    story_intro: "Endlech.lu war eigentlech scho säit Jore iwwerfälleg. D'Iddi hat ech schonn als Jugendlechen — eng Plaz, wou Mënsche mat ageschränkter Mobilitéit onkomplizéiert barrierefrä Restauranten zu Lëtzebuerg fannen kënnen. Eppes, dat et esou einfach an iwwersiichtlech ganz einfach nach net gouf."
    timeline_2018_title: "Planung fänkt un"
    timeline_2018_text: "D'Iddi ass zur konkreter Decisioun gereeft: Ech wollt d'Plattform wierklech bauen. 2018 hunn ech ugefaangen, de Projet seriö ze plangen."
    timeline_2020_title: "Aktiv Entwécklung"
    timeline_2020_text: "Zesumme mat engem Frënd a Partner hunn ech ugefaangen, d'Plattform aktiv ëmzesetzen. Mir hunn d'Visioun gedeelt an hunn mat richtigem Elan dru geschafft."
    timeline_2022_title: "Onfrëiwëlleg Paus"
    timeline_2022_text: "Leider huet et mam Partner net geklappt, an eleng hat ech einfach net d'Zäit. De Projet hunn ech schwéieren Häerzens op Äis geluecht."
    timeline_2025_title: "Neistart"
    timeline_2025_text: "Enn 2025 hunn ech beschloss, nees unzefänken — an et dës Kéier duerchzezéien. Mat neier Energie an dem richtegen Tech-Stack hunn ech d'Entwécklung komplett nei gestart."
    timeline_2026_date: "Mäerz 2026"
    timeline_2026_title: "Éischt Live-Versioun"
    timeline_2026_text: "Am Mäerz 2026 geet Endlech.lu endlech online — mat richtegen Restaurantdaten, Barrierefreiheets-Filteren, Community-Virschléi an engem komplettem Admin-Panel. Den Ufank ass gemaach, an d'Plattform wiisst mat all Bewäertung."
    mission_title: "Eis Missioun"
    mission_text: "Barrierefreiheet soll keen Zoufall sinn. Mat Endlech.lu wëlle mir Mënsche mat ageschränkter Mobilitéit hëllefen, Restauranten zu Lëtzebuerg ze fannen, déi wierklech zougänglech sinn — vun der Community gepréift, fir d'Community."
    mission_cta: "Restauranten entdecken"

legal:
    title: "Impressum – Endlech.lu"
    heading: "Impressum"
    info_title: "Informatiounen geméiss § 5 TMG / Art. 11 Loi sur le commerce électronique"
    info_text: "Endlech.lu\nLëtzebuerg"
    contact_title: "Kontakt"
    contact_email_label: "E-Mail:"
    disclaimer_title: "Haftungsausschloss"
    content_title: "Haftung fir Inhalter"
    content_text: "D'Inhalter vun eise Säiten goufe mat gréisster Suergfalt erstallt. Fir d'Richtegkeet, Vollstännegkeet an Aktualitéit vun den Inhalter kënne mir awer keng Garantie iwwerhuelen."
    links_title: "Haftung fir Linken"
    links_text: "Eist Ugebot enthält Linken op extern Websäite vu Drëtten, op deenen hiren Inhalt mir keen Afloss hunn. Dofir kënne mir fir dës friem Inhalter och keng Garantie iwwerhuelen. Fir d'Inhalter vun de verlinkten Säiten ass ëmmer den jeweilegen Ubidder oder Bedreiwer vun de Säite verantwortlech."
    privacy_title: "Dateschutz"
    privacy_text: "D'Benotzung vun eiser Websäit ass an der Reegel ouni Ugab vu personebezunnenen Daten méiglech. Soubal op eise Säite personebezunnen Daten (zum Beispill Numm, Adress oder E-Mail-Adressen) erhuewe ginn, geschitt dat, soubal méiglech, ëmmer op fräiwëlleger Basis."

criteria:
    title: "Critèren fir Barrierefreiheet – Endlech.lu"
    heading: "Critèren fir Barrierefreiheet"
    intro: "Dës Critèren hëllefen eis, Restauranten objektiv op hir Barrierefreiheet ze bewäerten. All Restaurant gëtt op Basis vun de folgenden Punkten agestuuft."
    entrance_title: "Barrierefrä Agang"
    entrance_text: "Den Agang ass ouni Trapen oder Schwellen zougänglech, oder eng Ramp ass disponibel. Automatesch oder liicht opzemaachend Diere sinn e Plus."
    parking_title: "Behënnerteparkplaz"
    parking_text: "En ausgewisene Parkplaz fir Persounen mat enger Behënnerung an der Géigend vum Agang ass disponibel."
    toilet_title: "Barrierefrä Toilette"
    toilet_text: "Eng rollstullgerecht Toilette mat genuch Bewegungsfreiheet, Haltestangen an erreechemem Wäschbecken ass disponibel."
    interior_title: "Rollstullgerechten Interieur"
    interior_text: "Breet genuch Gäng (op d'mannst 90 cm), ënnerfuerbar Dëscher a genuch Beweegungsraum tëschent de Sëtzplazen erlaben eng selbststänneg Navigatioun."
    staff_title: "Hëllfsbereeten Personal"
    staff_text: "D'Personal ass sensibiliséiert a bereet, Mënschen mat Aschränkungen aktiv ze ënnerstëtzen — ouni opdränglech ze sinn."
    menu_title: "Gutt liesbaren Menü"
    menu_text: "De Menü ass a gudder liesbar Schrëftgréisst gedréckt oder digital disponibel. Braille- oder Groussdrock-Versiounen sinn en zousätzleche Plus."
    note_label: "Hiweiser:"
    note_text: "D'Bewäertungen op Endlech.lu baséieren op Erfarunge vun eiser Community. Barrierefreiheet kann sech je no individuellem Bedierfnis ënnerscheeden. Mir recommandéieren, virum Besuch direkt beim Restaurant nozefroe."


# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# Root-Redirect: / → /{locale}/
app_root:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: app_home
        _locale: lb
        permanent: false

# Alle Controller mit /{_locale} Prefix (inkl. Admin)
controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: lb|de|fr|en
    defaults:
        _locale: lb
